id: iis_path_traversal
title: IIS Path Traversal Attempt
status: stable
description: Detects directory traversal sequences in the URL path or query string, including encoded variants.
level: high
tags:
  - attack.t1190
logsource:
  product: iis
  service: w3c
detection:
  selection:
    url_decoded|contains_any:
      - "../"
      - "..\\"
      - "/etc/passwd"
      - "\\windows\\system32"
      - "boot.ini"
      - "win.ini"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - uri_query
  - status
  - user_agent
falsepositives:
  - Vulnerability scanners during authorized assessments
references:
  - https://attack.mitre.org/techniques/T1190/
  - https://owasp.org/www-community/attacks/Path_Traversal
