id: iis_traversal_encoded_variants
title: IIS Encoded Path Traversal Variants
status: stable
description: >
  Detects URL- and overlong-encoded directory traversal sequences in the
  original request URL (%2e%2e, ..%2f, ..%5c, ..%c0%af). These encodings are
  used to evade filters that only block the literal ../ sequence.
level: high
tags:
  - attack.t1190
  - attack.t1027
logsource:
  product: iis
  service: w3c
detection:
  selection:
    url_original|contains_any:
      - "..%2f"
      - "..%5c"
      - "%2e%2e%2f"
      - "%2e%2e/"
      - "..%255c"
      - "..%c0%af"
      - "..%c1%9c"
      - "%252e%252e"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - uri_query
  - status
  - user_agent
falsepositives:
  - Vulnerability scanners during authorized assessments
references:
  - https://owasp.org/www-community/attacks/Path_Traversal
  - https://owasp.org/www-community/Double_Encoding
