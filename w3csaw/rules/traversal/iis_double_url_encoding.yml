id: iis_double_url_encoding
title: IIS Double URL Encoding Detected
status: experimental
description: Detects doubly URL-encoded sequences (%25xx) in requests, commonly used to bypass request filtering and WAF rules.
level: medium
tags:
  - attack.t1190
  - attack.t1027
logsource:
  product: iis
  service: w3c
detection:
  selection:
    url_original|contains_any:
      - "%252e"
      - "%252f"
      - "%255c"
      - "%2527"
      - "%253c"
      - "%2500"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - uri_query
  - status
falsepositives:
  - Applications that legitimately double-encode parameter values
references:
  - https://owasp.org/www-community/Double_Encoding
