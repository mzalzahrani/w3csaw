id: iis_traversal_null_byte
title: IIS Null Byte Injection Attempt
status: experimental
description: >
  Detects encoded null bytes (%00) in the original request URL, a classic
  technique for truncating file paths and extensions to bypass validation and
  reach unintended files.
level: medium
tags:
  - attack.t1190
  - attack.t1027
logsource:
  product: iis
  service: w3c
detection:
  selection:
    url_original|contains_any:
      - "%00"
      - "%2500"
      - "\\x00"
      - "%u0000"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - uri_query
  - status
falsepositives:
  - Rare applications that encode binary data in URL parameters
references:
  - https://owasp.org/www-community/attacks/Path_Traversal
