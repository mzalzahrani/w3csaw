id: iis_traversal_sensitive_files
title: IIS Sensitive System File Access Attempt
status: stable
description: >
  Detects attempts to access well-known sensitive files (boot.ini, win.ini,
  hosts, SAM, /etc/passwd, /etc/shadow) through the decoded URL, a strong
  indicator of local file inclusion or path traversal exploitation.
level: high
tags:
  - attack.t1190
  - attack.t1083
logsource:
  product: iis
  service: w3c
detection:
  selection:
    url_decoded|contains_any:
      - "boot.ini"
      - "win.ini"
      - "/etc/passwd"
      - "/etc/shadow"
      - "/etc/hosts"
      - "system32\\drivers\\etc\\hosts"
      - "system32\\config\\sam"
      - "\\repair\\sam"
      - "ntds.dit"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - uri_query
  - status
  - user_agent
falsepositives:
  - Security scanners probing for LFI
  - Very rare legitimate references to these filenames
references:
  - https://owasp.org/www-community/attacks/Path_Traversal
