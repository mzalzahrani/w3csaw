id: iis_scanning_backup_and_config_file_access
title: IIS Backup or Config File Extension Access
status: experimental
description: >
  Detects requests for backup, archive, and configuration file extensions that
  are frequently left on web servers by mistake and harvested by attackers for
  source code, credentials, or database dumps.
level: medium
tags:
  - attack.t1595.003
  - attack.t1083
logsource:
  product: iis
  service: w3c
detection:
  selection:
    extension|in:
      - ".bak"
      - ".old"
      - ".backup"
      - ".swp"
      - ".save"
      - ".orig"
      - ".sql"
      - ".config"
      - ".ini"
      - ".log"
      - ".dbf"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - status
  - user_agent
falsepositives:
  - Applications serving downloadable .log or .ini files by design
  - Legitimate .config references
references:
  - https://attack.mitre.org/techniques/T1595/003/
