id: iis_sql_injection_keywords
title: IIS SQL Injection Keywords in Request
status: stable
description: Detects common SQL injection payloads in decoded query strings.
level: high
tags:
  - attack.t1190
logsource:
  product: iis
  service: w3c
detection:
  selection:
    uri_query_decoded|contains_any:
      - "union select"
      - "union all select"
      - "' or 1=1"
      - "\" or 1=1"
      - "or '1'='1"
      - "waitfor delay"
      - "sleep("
      - "benchmark("
      - "xp_cmdshell"
      - "information_schema"
      - "@@version"
      - "sysobjects"
      - "; drop table"
      - "'; exec"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - uri_query
  - status
  - user_agent
falsepositives:
  - Applications passing SQL-like text in parameters (report builders, search)
references:
  - https://attack.mitre.org/techniques/T1190/
  - https://owasp.org/www-community/attacks/SQL_Injection
