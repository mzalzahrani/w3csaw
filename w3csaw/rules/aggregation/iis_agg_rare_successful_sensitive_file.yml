id: iis_agg_rare_successful_sensitive_file
title: IIS Rare Successful Access to Sensitive File Type
status: experimental
description: >
  Detects rarely accessed but successfully served sensitive file types (config,
  backup, key, and archive extensions). A sensitive file that is fetched only
  once or twice across the whole log set is worth reviewing as a possible data
  exposure or exfiltration event.
level: medium
tags:
  - attack.t1552.001
  - attack.t1083
logsource:
  product: iis
  service: w3c
type: aggregation
aggregation:
  variant: rarity
  group_by:
    - uri_path
  filter:
    status:
      gte: 200
      lt: 300
    extension|in:
      - ".config"
      - ".bak"
      - ".sql"
      - ".zip"
      - ".pem"
      - ".key"
      - ".pfx"
  count_lte: 2
  window_minutes: 1440
fields:
  - timestamp
  - src_ip
  - uri_path
  - status
  - extension
  - user_agent
falsepositives:
  - Legitimate one-off downloads of backups or certificates by administrators
references:
  - https://attack.mitre.org/techniques/T1552/001/
