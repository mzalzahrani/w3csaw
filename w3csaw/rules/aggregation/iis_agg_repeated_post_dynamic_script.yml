id: iis_agg_repeated_post_dynamic_script
title: IIS Repeated POST to Dynamic Script From Single Source
status: experimental
description: >
  Detects a source IP repeatedly POSTing to dynamic script endpoints in a short
  window. Web shell command-and-control typically drives a single endpoint with
  many POST requests, which this rule surfaces without per-line noise.
level: medium
tags:
  - attack.t1505.003
  - attack.t1071.001
logsource:
  product: iis
  service: w3c
type: aggregation
aggregation:
  variant: threshold
  group_by:
    - src_ip
    - uri_path
  filter:
    method: POST
  # Raised from 25. Outlook/EWS/MAPI drive one endpoint (e.g. /mapi/emsmdb,
  # /EWS/Exchange.asmx) with many POSTs per session; 25 is normal traffic.
  count_gte: 100
  window_minutes: 10
fields:
  - timestamp
  - src_ip
  - uri_path
  - status
  - user_agent
falsepositives:
  - AJAX-heavy applications and polling endpoints that POST frequently
  - API integrations
references:
  - https://attack.mitre.org/techniques/T1505/003/
