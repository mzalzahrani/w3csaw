id: iis_agg_scanner_ua_high_volume
title: IIS High Volume From Scanner User Agent
status: experimental
description: >
  Detects a source IP presenting a known scanner user agent and generating a high
  request volume in a short window, distinguishing an active automated scan from
  an isolated scanner-string request.
level: medium
tags:
  - attack.t1595.002
logsource:
  product: iis
  service: w3c
type: aggregation
aggregation:
  variant: threshold
  group_by:
    - src_ip
  filter:
    user_agent|contains_any:
      - "sqlmap"
      - "nikto"
      - "nuclei"
      - "acunetix"
      - "nessus"
      - "gobuster"
      - "dirbuster"
      - "feroxbuster"
      - "wpscan"
      - "masscan"
  count_gte: 50
  window_minutes: 15
fields:
  - timestamp
  - src_ip
  - uri_path
  - status
  - user_agent
falsepositives:
  - Authorized vulnerability scans (allowlist the scanning host)
references:
  - https://attack.mitre.org/techniques/T1595/002/
