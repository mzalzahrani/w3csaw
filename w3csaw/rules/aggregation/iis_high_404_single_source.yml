id: iis_high_404_single_source
title: IIS High 404 Volume From Single Source
status: stable
description: Detects source IPs causing high numbers of 404 responses, often related to scanning or content discovery.
level: medium
type: aggregation
tags:
  - attack.t1595.003
  - attack.t1083
logsource:
  product: iis
  service: w3c
aggregation:
  group_by:
    - src_ip
  filter:
    status: 404
  count_gte: 100
  window_minutes: 60
fields:
  - src_ip
  - status
  - uri_path
  - user_agent
falsepositives:
  - Broken internal links after a site restructure
  - Monitoring systems probing removed endpoints
references:
  - https://attack.mitre.org/techniques/T1595/003/
