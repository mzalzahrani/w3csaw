id: iis_rare_successful_dynamic_extension
title: IIS Rare Successfully Accessed Dynamic Script
status: experimental
description: Detects dynamic script paths that were successfully requested only a handful of times across the whole log set. A freshly dropped web shell is often the only rarely-hit dynamic resource on a busy server.
level: medium
type: aggregation
tags:
  - attack.t1505.003
logsource:
  product: iis
  service: w3c
aggregation:
  group_by:
    - uri_path
  filter:
    extension|in:
      - ".aspx"
      - ".ashx"
      - ".asmx"
      - ".svc"
      - ".asp"
      - ".jsp"
    status:
      gte: 200
      lt: 300
  count_lte: 3
  window_minutes: 1440
fields:
  - uri_path
  - src_ip
  - status
  - extension
  - user_agent
falsepositives:
  - Rarely used but legitimate application endpoints
  - Newly deployed application features
references:
  - https://attack.mitre.org/techniques/T1505/003/
