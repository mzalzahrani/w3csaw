id: iis_suspicious_post_dynamic_script
title: IIS Suspicious POST to Dynamic Script Without Referer
status: experimental
description: Detects POST requests to dynamic script endpoints with no referer, a common web shell interaction pattern (tools like China Chopper POST directly to the shell).
level: medium
tags:
  - attack.t1505.003
logsource:
  product: iis
  service: w3c
detection:
  selection:
    method: POST
    uri_path|endswith_any:
      - ".aspx"
      - ".ashx"
      - ".asmx"
      - ".asp"
    referer|not_exists: true
    status:
      gte: 200
      lt: 300
  filter:
    uri_path_decoded|contains_any:
      - "/api/"
      - "/owa/"
      - "/ews/"
      - "/webresource.axd"
      - "/scriptresource.axd"
  condition: selection and not filter
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - status
  - user_agent
  - bytes_received
falsepositives:
  - Legitimate API clients and form posts that strip referer headers
  - Mobile applications
references:
  - https://attack.mitre.org/techniques/T1505/003/
