id: iis_webshell_encoded_powershell_command
title: IIS Encoded PowerShell Command in Request
status: stable
description: >
  Detects encoded PowerShell execution indicators in the decoded URL, such as
  encoded-command switches and Base64 decode calls. These strings appearing in
  web traffic strongly suggest command execution via a web shell or exploited
  endpoint.
level: high
tags:
  - attack.t1059.001
  - attack.t1027
  - attack.t1505.003
logsource:
  product: iis
  service: w3c
detection:
  selection:
    url_decoded|contains_any:
      - "-encodedcommand"
      - "-enc "
      - "-e jab"
      - "frombase64string"
      - "powershell -nop"
      - "powershell -w hidden"
      - "iex("
      - "invoke-expression"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - uri_query
  - status
  - user_agent
falsepositives:
  - Security tooling or documentation endpoints referencing PowerShell syntax
  - Authorized red-team activity
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1027/
