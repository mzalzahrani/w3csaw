id: iis_webshell_suspicious_parameter_names
title: IIS Suspicious Web Shell Parameter Names on Dynamic Script
status: experimental
description: >
  Detects query-string parameter names commonly used by web shells and their
  management panels (single-letter command params, action verbs, and known
  shell keywords) when sent to a dynamic IIS script. Parameter naming alone is
  a weaker signal than explicit command keywords, so this is tuned to dynamic
  endpoints and intended for triage and correlation.
level: medium
tags:
  - attack.t1505.003
logsource:
  product: iis
  service: w3c
detection:
  selection:
    uri_path_decoded|endswith_any:
      - ".aspx"
      - ".ashx"
      - ".asmx"
      - ".asp"
      - ".svc"
    uri_query_decoded|contains_any:
      - "action=cmd"
      - "action=shell"
      - "action=exec"
      - "action=upload"
      - "act=cmd"
      - "xcmd="
      - "shell="
      - "c99shell"
      - "&pass="
      - "?pwd="
      - "o=vuln"
      - "cmd_shell"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - uri_query
  - status
  - user_agent
falsepositives:
  - Legitimate applications using generic parameter names such as action= or shell=
  - Authorized penetration testing
references:
  - https://attack.mitre.org/techniques/T1505/003/
  - https://learn.microsoft.com/en-us/iis/
