id: iis_auth_credentials_in_query_string
title: IIS Credentials Passed in Query String
status: experimental
description: >
  Detects password or token parameters carried in the query string. Beyond being
  a hygiene issue (credentials logged in plaintext), a spike of such requests can
  indicate credential stuffing or brute forcing against endpoints that accept
  credentials via GET.
level: medium
tags:
  - attack.t1552.001
  - attack.t1110
logsource:
  product: iis
  service: w3c
detection:
  selection:
    uri_query_decoded|contains_any:
      - "password="
      - "passwd="
      - "&pwd="
      - "?pwd="
      - "apikey="
      - "api_key="
      - "access_token="
      - "auth_token="
      - "secret="
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - uri_query
  - status
  - user_agent
falsepositives:
  - Legacy applications that legitimately accept tokens via query string (still worth flagging for remediation)
references:
  - https://owasp.org/www-community/vulnerabilities/Information_exposure_through_query_strings
