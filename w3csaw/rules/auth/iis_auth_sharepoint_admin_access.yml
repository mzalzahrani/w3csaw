id: iis_auth_sharepoint_admin_access
title: IIS SharePoint Administrative Path Access
status: experimental
description: >
  Detects access to SharePoint central administration and layouts management
  paths. External or unexpected access to these endpoints can indicate
  reconnaissance or exploitation of SharePoint vulnerabilities.
level: medium
tags:
  - attack.t1190
logsource:
  product: iis
  service: w3c
detection:
  selection:
    uri_path_decoded|contains_any:
      - "/_admin/"
      - "/_layouts/15/settings.aspx"
      - "/_layouts/15/appprincipals.aspx"
      - "/_layouts/15/newdwp.aspx"
      - "/_layouts/15/aclinv.aspx"
      - "/_vti_pvt/"
      - "/_catalogs/"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - status
  - user_agent
falsepositives:
  - SharePoint administrators performing legitimate configuration
references:
  - https://learn.microsoft.com/en-us/sharepoint/
  - https://attack.mitre.org/techniques/T1190/
