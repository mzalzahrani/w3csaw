id: iis_exchange_owa_suspicious_access
title: IIS Exchange/OWA Suspicious Endpoint Access
status: experimental
description: Detects access patterns associated with Exchange server exploitation (ProxyLogon/ProxyShell style SSRF and web shell drop locations).
level: critical
tags:
  - attack.t1190
  - attack.t1505.003
  - cve.2021.26855
logsource:
  product: iis
  service: w3c
detection:
  selection_ssrf:
    # NOTE: bare "/mapi/nspi" was removed — it is the normal MAPI/HTTP address
    # book endpoint and every Outlook client hits it, producing critical FPs.
    # Only genuine ProxyLogon/ProxyShell SSRF IOCs remain below.
    url_decoded|contains_any:
      - "/autodiscover/autodiscover.json?@"
      - "/ecp/y.js"
      - "/ecp/x.js"
      - "/ecp/ddi/ddiservice.svc/setobject"
      - "x-anonresource-backend"
      - "x-beresource"
      - "/powershell/?x="
  selection_shell_drop:
    uri_path_decoded|contains_any:
      - "/aspnet_client/system_web/"
      - "/owa/auth/current/themes/resources/"
    extension|in:
      - ".aspx"
      - ".ashx"
  condition: selection_ssrf or selection_shell_drop
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - uri_query
  - status
  - user_agent
falsepositives:
  - Exchange health probes (correlate source IP and user agent)
references:
  - https://nvd.nist.gov/vuln/detail/CVE-2021-26855
  - https://www.microsoft.com/en-us/security/blog/2021/03/02/hafnium-targeting-exchange-servers/
