id: iis_auth_suspicious_username_injection
title: IIS Suspicious Characters in Authenticated Username
status: experimental
description: >
  Detects injection-like or malformed characters in the cs-username field, which
  can indicate SQL/LDAP injection attempts against authentication, credential
  stuffing with malformed input, or log injection. Only fires when a username is
  present in the log.
level: medium
tags:
  - attack.t1190
  - attack.t1078
logsource:
  product: iis
  service: w3c
detection:
  selection:
    username|re:
      - "['\";<>()]"
      - "(?:or|and)\\s+1=1"
      - "\\)\\(\\|"
      - "\\bunion\\b"
  condition: selection
fields:
  - timestamp
  - src_ip
  - username
  - uri_path
  - status
  - user_agent
falsepositives:
  - Directory setups that allow unusual characters in account names
references:
  - https://owasp.org/www-community/attacks/SQL_Injection
