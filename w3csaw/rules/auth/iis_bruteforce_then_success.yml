id: iis_bruteforce_then_success
title: IIS 401/403 Brute Force Followed by Success
status: experimental
description: Detects a source IP that generated repeated 401/403 responses within a time window and then received a 200, suggesting successful credential guessing or access-control bypass.
level: high
type: aggregation
tags:
  - attack.t1110
  - attack.t1078
logsource:
  product: iis
  service: w3c
aggregation:
  group_by:
    - src_ip
  filter:
    status|in:
      - "401"
      - "403"
  followed_by:
    status:
      gte: 200
      lt: 300
  # Raised from 10. On Windows-auth endpoints (Exchange/NTLM/Kerberos) a 401
  # challenge before a 200 is the *normal* handshake, so a low threshold is
  # pure noise. Confirm real brute force against Security.evtx 4625 events.
  count_gte: 30
  window_minutes: 15
fields:
  - src_ip
  - status
  - uri_path
  - username
  - user_agent
falsepositives:
  - Users mistyping passwords before a successful login
  - Applications probing endpoints anonymously before authenticating
references:
  - https://attack.mitre.org/techniques/T1110/
