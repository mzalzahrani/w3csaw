id: iis_upload_script_in_upload_directory
title: IIS Successful Script Execution in Upload Directory
status: stable
description: >
  Detects successful requests for dynamic scripts located under upload, temp,
  cache, or media directories. Executing a server-side script from a
  user-writable upload location is one of the strongest web shell indicators
  available from access logs alone.
level: high
tags:
  - attack.t1505.003
logsource:
  product: iis
  service: w3c
detection:
  selection:
    status:
      gte: 200
      lt: 300
    uri_path_decoded|contains_any:
      - "/upload"
      - "/uploads"
      - "/temp/"
      - "/tmp/"
      - "/cache/"
      - "/media/"
      - "/files/"
      - "/attachments/"
    uri_path_decoded|endswith_any:
      - ".aspx"
      - ".ashx"
      - ".asmx"
      - ".asp"
      - ".jsp"
      - ".php"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - status
  - user_agent
falsepositives:
  - Applications that legitimately serve dynamic handlers from media/upload paths (rare; verify)
references:
  - https://attack.mitre.org/techniques/T1505/003/
