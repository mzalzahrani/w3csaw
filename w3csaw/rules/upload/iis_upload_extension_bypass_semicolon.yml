id: iis_upload_extension_bypass_semicolon
title: IIS Semicolon Extension Parsing Bypass
status: experimental
description: >
  Detects the classic IIS semicolon file-parsing bypass (for example
  file.asp;.jpg), where legacy IIS executes the portion before the semicolon.
  Presence of a script extension followed by a semicolon in the path is a strong
  upload-bypass indicator.
level: high
tags:
  - attack.t1190
  - attack.t1505.003
logsource:
  product: iis
  service: w3c
detection:
  selection:
    url_decoded|contains_any:
      - ".asp;"
      - ".aspx;"
      - ".ashx;"
      - ".asmx;"
      - ".cer;"
      - ".asa;"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - status
  - user_agent
falsepositives:
  - Extremely rare; semicolons in these positions are almost always deliberate
references:
  - https://learn.microsoft.com/en-us/iis/
  - https://attack.mitre.org/techniques/T1190/
