id: iis_sharepoint_suspicious_upload
title: IIS SharePoint Suspicious Upload or Layouts Access
status: experimental
description: Detects suspicious SharePoint activity, including script uploads via web services and dynamic script access under /_layouts/, associated with SharePoint exploitation (e.g. CVE-2019-0604, ToolShell-style chains).
level: high
tags:
  - attack.t1190
  - attack.t1505.003
logsource:
  product: iis
  service: w3c
detection:
  selection_upload:
    method: POST
    uri_path_decoded|contains_any:
      - "/_vti_bin/"
      - "/_layouts/15/upload.aspx"
      - "/_api/web/getfolderbyserverrelativeurl"
  selection_shell:
    uri_path_decoded|contains_any:
      - "/_layouts/15/"
      - "/_layouts/16/"
    uri_path_decoded|endswith_any:
      - "spinstall0.aspx"
      - "ghostfile.aspx"
      - "cmd.aspx"
      - "shell.aspx"
  condition: selection_upload or selection_shell
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - status
  - user_agent
falsepositives:
  - Legitimate SharePoint client and workflow traffic to /_vti_bin/
references:
  - https://nvd.nist.gov/vuln/detail/CVE-2019-0604
  - https://attack.mitre.org/techniques/T1505/003/
