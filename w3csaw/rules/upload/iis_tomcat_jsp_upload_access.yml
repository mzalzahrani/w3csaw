id: iis_tomcat_jsp_upload_access
title: IIS Tomcat/JSP Upload Path Access
status: experimental
description: Detects access to JSP files under upload/temporary directories or Tomcat manager deployment endpoints, indicating possible JSP web shell deployment behind an IIS reverse proxy.
level: high
tags:
  - attack.t1505.003
  - attack.t1190
logsource:
  product: iis
  service: w3c
detection:
  selection_upload_jsp:
    uri_path_decoded|contains_any:
      - "/upload"
      - "/uploads"
      - "/tmp/"
      - "/temp/"
      - "/files/"
    uri_path_decoded|endswith_any:
      - ".jsp"
      - ".jspx"
  selection_manager:
    uri_path_decoded|contains_any:
      - "/manager/html/upload"
      - "/manager/text/deploy"
      - "/host-manager/"
  condition: selection_upload_jsp or selection_manager
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - status
  - user_agent
falsepositives:
  - Legitimate Tomcat administration from known hosts
references:
  - https://attack.mitre.org/techniques/T1505/003/
