id: iis_rce_expression_language_injection
title: IIS Expression Language / Template Injection Indicators
status: experimental
description: >
  Detects expression-language and template-injection probes (Spring/JSP EL,
  FreeMarker, Velocity) in decoded query strings. Complements the SSTI rule with
  Java-oriented EL patterns that can lead to remote code execution.
level: high
tags:
  - attack.t1190
  - attack.t1059
logsource:
  product: iis
  service: w3c
detection:
  selection:
    uri_query_decoded|contains_any:
      - "${t("
      - "#{t("
      - "${@java"
      - "freemarker.template.utility.execute"
      - "<#assign"
      - "runtime.exec"
      - "${applicationscope"
      - "#{request."
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - uri_query
  - status
falsepositives:
  - Applications using template-like syntax in legitimate parameters
references:
  - https://portswigger.net/research/server-side-template-injection
