id: iis_rce_php_wrappers
title: IIS PHP Stream Wrapper Injection Indicators
status: experimental
description: >
  Detects PHP stream-wrapper schemes (php://, data://, phar://, expect://) in
  the decoded URL, used for local file inclusion and remote code execution
  against PHP applications proxied or hosted behind IIS.
level: medium
tags:
  - attack.t1190
  - attack.t1059
logsource:
  product: iis
  service: w3c
detection:
  selection:
    url_decoded|contains_any:
      - "php://filter"
      - "php://input"
      - "data://text"
      - "phar://"
      - "expect://"
      - "zip://"
      - "glob://"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - uri_query
  - status
falsepositives:
  - Rare legitimate parameters containing these scheme strings
references:
  - https://owasp.org/www-community/attacks/Path_Traversal
  - https://attack.mitre.org/techniques/T1190/
