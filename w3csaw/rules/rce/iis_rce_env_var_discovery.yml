id: iis_rce_env_var_discovery
title: IIS Environment Variable or Config Discovery Keywords
status: experimental
description: >
  Detects attempts to read environment variables or process configuration
  through the decoded URL (Windows environment tokens, /proc/self/environ,
  printenv). Often follows initial code execution as attackers enumerate the
  host.
level: medium
tags:
  - attack.t1082
  - attack.t1083
logsource:
  product: iis
  service: w3c
detection:
  selection:
    url_decoded|contains_any:
      - "%systemroot%"
      - "%windir%"
      - "%userprofile%"
      - "$env:"
      - "printenv"
      - "/proc/self/environ"
      - "get-childitem env:"
      - "set|findstr"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - uri_query
  - status
  - user_agent
falsepositives:
  - Applications that echo environment or template tokens in legitimate parameters
references:
  - https://attack.mitre.org/techniques/T1082/
