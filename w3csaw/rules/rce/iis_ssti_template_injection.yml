id: iis_ssti_template_injection
title: IIS Server-Side Template Injection Indicators
status: experimental
description: Detects template expression probes ({{7*7}}, ${7*7}, <%= %>) used to identify server-side template injection.
level: high
tags:
  - attack.t1190
  - attack.t1059
logsource:
  product: iis
  service: w3c
detection:
  selection:
    uri_query_decoded|contains_any:
      - "{{7*7}}"
      - "${7*7}"
      - "<%= "
      - "{{config"
      - "{{self."
      - "{{request."
      - "__class__.__mro__"
      - "#{7*7}"
      - "freemarker.template"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - uri_query
  - status
falsepositives:
  - Applications using template-like syntax in parameters
references:
  - https://portswigger.net/research/server-side-template-injection
