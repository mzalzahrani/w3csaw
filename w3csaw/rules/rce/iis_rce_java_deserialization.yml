id: iis_rce_java_deserialization
title: IIS Java Deserialization Payload Indicators
status: experimental
description: >
  Detects markers of serialized Java objects in the decoded URL, including the
  Base64 prefix of a serialized stream (rO0AB) and the raw magic bytes
  (aced0005). Deserialization of attacker-controlled objects is a common RCE
  vector for Java middleware behind IIS.
level: high
tags:
  - attack.t1190
logsource:
  product: iis
  service: w3c
detection:
  selection:
    url_decoded|contains_any:
      - "ro0ab"
      - "aced0005"
      - "java.lang.runtime"
      - "org.apache.commons.collections"
      - "sun.reflect.annotation"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - uri_query
  - status
  - user_agent
falsepositives:
  - Applications that legitimately transport serialized Java objects in parameters
references:
  - https://attack.mitre.org/techniques/T1190/
  - https://owasp.org/www-community/vulnerabilities/Deserialization_of_untrusted_data
