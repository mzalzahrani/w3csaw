id: iis_rce_powershell_download_cradle
title: IIS PowerShell Download Cradle in Request
status: stable
description: >
  Detects PowerShell download-and-execute cradle fragments in the decoded URL
  (WebClient, Invoke-WebRequest, DownloadString, DownloadFile). These are used
  to pull second-stage payloads after achieving command execution.
level: high
tags:
  - attack.t1059.001
  - attack.t1105
logsource:
  product: iis
  service: w3c
detection:
  selection:
    url_decoded|contains_any:
      - "downloadstring"
      - "downloadfile"
      - "downloaddata"
      - "invoke-webrequest"
      - "net.webclient"
      - "new-object net"
      - "start-bitstransfer"
      - "invoke-restmethod"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - uri_query
  - status
  - user_agent
falsepositives:
  - PowerShell documentation or tutorial content served by the site
references:
  - https://attack.mitre.org/techniques/T1105/
