id: iis_auth_admin_login_endpoint_access
title: IIS Access to Admin or Login Endpoint
status: experimental
description: >
  Detects access to authentication and administrative login endpoints. Low
  severity on its own; most valuable when correlated with the brute-force
  aggregation rules or when the source IP is unexpected.
level: low
tags:
  - attack.t1078
logsource:
  product: iis
  service: w3c
detection:
  selection:
    uri_path_decoded|contains_any:
      - "/login"
      - "/signin"
      - "/admin/login"
      - "/auth/login"
      - "/account/login"
      - "/owa/auth"
      - "/ecp/"
      - "/rdweb/pages/en-us/login.aspx"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - username
  - status
  - user_agent
falsepositives:
  - Normal user and administrator sign-in activity
references:
  - https://attack.mitre.org/techniques/T1078/
