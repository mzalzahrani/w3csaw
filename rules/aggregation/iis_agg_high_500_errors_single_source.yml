id: iis_agg_high_500_errors_single_source
title: IIS High 500 Error Volume From Single Source
status: experimental
description: >
  Detects a source IP triggering many HTTP 500 server errors in a short window.
  Bursts of server errors from one source often accompany exploitation attempts
  (injection, deserialization, malformed payloads) that crash application code.
level: medium
tags:
  - attack.t1190
logsource:
  product: iis
  service: w3c
type: aggregation
aggregation:
  variant: threshold
  group_by:
    - src_ip
  filter:
    status:
      gte: 500
      lt: 600
  count_gte: 50
  window_minutes: 30
fields:
  - timestamp
  - src_ip
  - uri_path
  - status
  - user_agent
falsepositives:
  - Genuine application outages affecting all clients
  - Buggy client integrations
references:
  - https://attack.mitre.org/techniques/T1190/
