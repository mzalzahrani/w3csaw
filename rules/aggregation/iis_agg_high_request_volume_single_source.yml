id: iis_agg_high_request_volume_single_source
title: IIS High Request Volume From Single Source
status: experimental
description: >
  Detects a source IP generating a very high request volume in a short window,
  characteristic of aggressive scanning, brute forcing, or content discovery.
  Note: this counts total requests, not distinct paths; it is the supported
  approximation for "one IP touching many unique URIs" until distinct-count
  aggregation is available.
level: medium
tags:
  - attack.t1595
  - attack.t1046
logsource:
  product: iis
  service: w3c
type: aggregation
aggregation:
  variant: threshold
  group_by:
    - src_ip
  count_gte: 500
  window_minutes: 10
fields:
  - timestamp
  - src_ip
  - uri_path
  - status
  - user_agent
falsepositives:
  - Proxies, NAT gateways, and shared egress IPs aggregating many users
  - Legitimate API clients and crawlers
references:
  - https://attack.mitre.org/techniques/T1595/
