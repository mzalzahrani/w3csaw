id: iis_webshell_unusual_method_dynamic_script
title: IIS Dynamic Script Accessed With Unusual HTTP Method
status: experimental
description: >
  Detects dynamic IIS script endpoints accessed with HTTP methods rarely used
  for normal application traffic (PUT, DELETE, PATCH, TRACE). Web shells and
  exploitation tooling sometimes drive endpoints with non-standard methods to
  bypass logging expectations or invoke specific handlers.
level: medium
tags:
  - attack.t1505.003
  - attack.t1071.001
logsource:
  product: iis
  service: w3c
detection:
  selection:
    method|in:
      - "PUT"
      - "DELETE"
      - "PATCH"
      - "TRACE"
    uri_path_decoded|endswith_any:
      - ".aspx"
      - ".ashx"
      - ".asmx"
      - ".asp"
      - ".svc"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - status
  - user_agent
falsepositives:
  - REST APIs that legitimately expose PUT/PATCH/DELETE on dynamic handlers
  - WebDAV-enabled applications
references:
  - https://attack.mitre.org/techniques/T1505/003/
