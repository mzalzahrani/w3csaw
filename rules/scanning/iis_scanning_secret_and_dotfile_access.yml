id: iis_scanning_secret_and_dotfile_access
title: IIS Secret File and Dotfile Access Attempt
status: stable
description: >
  Detects requests for secret-bearing dotfiles and application configuration
  files (.env, .git, .aws credentials, appsettings.json, web.config backups).
  Successful access can directly leak credentials and API keys.
level: high
tags:
  - attack.t1552.001
  - attack.t1083
logsource:
  product: iis
  service: w3c
detection:
  selection:
    uri_path_decoded|contains_any:
      - "/.env"
      - "/.git/config"
      - "/.git/head"
      - "/.aws/credentials"
      - "/.ssh/id_rsa"
      - "/appsettings.json"
      - "/web.config.bak"
      - "/.htpasswd"
      - "/.npmrc"
      - "/docker-compose.yml"
      - "/secrets.json"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - status
  - user_agent
falsepositives:
  - Security scanners probing for exposed secrets
  - Very rare legitimate access (should still be reviewed)
references:
  - https://attack.mitre.org/techniques/T1552/001/
