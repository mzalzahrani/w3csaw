id: iis_upload_dangerous_extension_write
title: IIS Write of Dangerous Extension via PUT
status: stable
description: >
  Detects PUT requests targeting server-executable or configuration extensions
  (.aspx, .asp, .ashx, .asmx, .config, .cer, .asa). A successful PUT of these
  file types directly plants executable content on the server.
level: high
tags:
  - attack.t1190
  - attack.t1505.003
logsource:
  product: iis
  service: w3c
detection:
  selection:
    method: PUT
    uri_path_decoded|endswith_any:
      - ".aspx"
      - ".asp"
      - ".ashx"
      - ".asmx"
      - ".asa"
      - ".cer"
      - ".config"
      - ".soap"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - status
  - user_agent
falsepositives:
  - Authorized deployment tooling using WebDAV PUT (should be scoped to known hosts)
references:
  - https://attack.mitre.org/techniques/T1505/003/
