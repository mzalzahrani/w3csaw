id: iis_upload_archive_or_executable_access
title: IIS Archive or Executable Access in Upload Directory
status: experimental
description: >
  Detects access to archive or executable-like files under upload, temp, or
  media directories. Attackers stage archives and binaries in writable
  directories for later extraction or execution.
level: medium
tags:
  - attack.t1105
logsource:
  product: iis
  service: w3c
detection:
  selection:
    uri_path_decoded|contains_any:
      - "/upload"
      - "/uploads"
      - "/temp/"
      - "/tmp/"
      - "/cache/"
      - "/media/"
      - "/files/"
    extension|in:
      - ".zip"
      - ".rar"
      - ".7z"
      - ".tar"
      - ".gz"
      - ".exe"
      - ".dll"
      - ".ps1"
      - ".bat"
      - ".war"
      - ".jar"
  condition: selection
fields:
  - timestamp
  - src_ip
  - method
  - uri_path
  - status
  - user_agent
falsepositives:
  - Applications that legitimately serve downloadable archives from these paths
references:
  - https://attack.mitre.org/techniques/T1105/
